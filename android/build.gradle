group 'com.f2fk.geofence_foreground_service'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '2.1.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}
def flutterSdkPath = localProperties.getProperty('flutter.sdk') ?: System.getenv('FLUTTER_ROOT')

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace = 'com.f2fk.geofence_foreground_service'
    compileSdk = 36


    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    defaultConfig {
        minSdk 24
        targetSdk 36
    }

    testOptions {
        unitTests.all {
            testLogging {
                events "passed", "skipped", "failed", "standardOut", "standardError"
                outputs.upToDateWhen { false }
                showStandardStreams = true
            }
        }
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'

    if (flutterSdkPath != null) {
        compileOnly files("$flutterSdkPath/bin/cache/artifacts/engine/android-arm64/flutter.jar")
    } else {
        logger.lifecycle("flutter.sdk not set (add android/local.properties or FLUTTER_ROOT); io.flutter imports will not resolve.")
    }

    // Align with AGP 8 / compileSdk 33; host apps typically pull newer via BOM/transitives.
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    implementation 'com.google.android.gms:play-services-maps:19.2.0'
    implementation 'androidx.work:work-runtime-ktx:2.10.3'
    implementation "androidx.concurrent:concurrent-futures:1.3.0"
}
